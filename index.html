<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinuC102学習アプリ</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#1e293b;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.choice{
    display:block;
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#e2e8f0;
    cursor:pointer;
    text-align:left;
}

.choice:hover{
    background:#cbd5e1;
}

.correct{
    background:#22c55e !important;
    color:white;
}

.incorrect{
    background:#ef4444 !important;
    color:white;
}

.stats{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.stat{
    background:#0f172a;
    color:white;
    padding:10px;
    border-radius:8px;
}

button{
    cursor:pointer;
}

#nextBtn{
    margin-top:20px;
    padding:12px;
    width:100%;
}
</style>

</head>
<body>

<header>
<h1>LinuC102学習アプリ</h1>
</header>

<div class="container">

<div class="card">
<div class="stats">
<div class="stat">問題数: <span id="total">0</span></div>
<div class="stat">回答数: <span id="answered">0</span></div>
<div class="stat">正解数: <span id="correct">0</span></div>
<div class="stat">正答率: <span id="rate">0%</span></div>
</div>
</div>

<div class="card">

<h2 id="question"></h2>

<div id="choices"></div>

<div id="result"></div>

<div id="explanation"></div>

<button id="nextBtn">
次の問題
</button>

</div>

</div>

<script>

const questions = [
{
category:"systemd",
question:"systemdでサービスを起動するコマンドは？",
choices:[
"systemctl start",
"service up",
"runsvc",
"systemd run"
],
answer:0,
explanation:"systemctl start サービス名 を使用する。"
},
{
category:"ssh",
question:"SSHの標準ポート番号は？",
choices:[
"22",
"21",
"80",
"443"
],
answer:0,
explanation:"SSHはTCP22番ポートを利用する。"
},
{
category:"filesystem",
question:"パーミッション変更コマンドは？",
choices:[
"chmod",
"chown",
"umask",
"passwd"
],
answer:0,
explanation:"chmodはアクセス権を変更する。"
}
];

let current=0;
let answered=0;
let correct=0;

document.getElementById("total").textContent =
questions.length;

function showQuestion(){

const q=questions[current];

document.getElementById("question")
.textContent=q.question;

document.getElementById("result").innerHTML="";
document.getElementById("explanation").innerHTML="";

const choicesDiv=
document.getElementById("choices");

choicesDiv.innerHTML="";

q.choices.forEach((choice,index)=>{

const btn=document.createElement("button");

btn.className="choice";

btn.textContent=choice;

btn.onclick=()=>checkAnswer(index);

choicesDiv.appendChild(btn);

});
}

function checkAnswer(selected){

const q=questions[current];

answered++;

const buttons=
document.querySelectorAll(".choice");

buttons.forEach(btn=>{
btn.disabled=true;
});

if(selected===q.answer){

correct++;

buttons[selected]
.classList.add("correct");

document.getElementById("result")
.innerHTML="<h3>正解</h3>";

}else{

buttons[selected]
.classList.add("incorrect");

buttons[q.answer]
.classList.add("correct");

document.getElementById("result")
.innerHTML="<h3>不正解</h3>";
}

document.getElementById("explanation")
.innerHTML=
"<p>"+q.explanation+"</p>";

updateStats();

saveProgress();
}

function updateStats(){

document.getElementById("answered")
.textContent=answered;

document.getElementById("correct")
.textContent=correct;

let rate=0;

if(answered>0){
rate=Math.round(correct/answered*100);
}

document.getElementById("rate")
.textContent=rate+"%";
}

function saveProgress(){

localStorage.setItem(
"linuc_progress",
JSON.stringify({
answered,
correct
})
);
}

function loadProgress(){

const data=
localStorage.getItem("linuc_progress");

if(!data) return;

const progress=
JSON.parse(data);

answered=progress.answered || 0;
correct=progress.correct || 0;

updateStats();
}

document
.getElementById("nextBtn")
.addEventListener("click",()=>{

current++;

if(current>=questions.length){
current=0;
}

showQuestion();

});

loadProgress();
showQuestion();

</script>

</body>
</html>
